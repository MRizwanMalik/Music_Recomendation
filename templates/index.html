<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Education Video Recommendation Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .results-section {
            margin-top: 30px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: #667eea;
        }

        .results-count {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .video-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .video-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .video-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 15px;
        }

        .video-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-weight: 600;
            color: #333;
        }

        .video-explanation {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-style: italic;
            color: #555;
        }

        .video-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .video-link:hover {
            background: #cc0000;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .info-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎺 Music Education Video Recommender</h1>
            <p>Rule-based recommendation engine for educational YouTube videos</p>
        </div>

        <div class="content">
            <div class="info-badge">
                📊 Using initial dataset of {{ initial_video_count }} videos. The system can be expanded to 100+ videos.
            </div>

            <div class="form-section">
                <h2>Your Learning Profile</h2>
                <form id="recommendationForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="target_goal">Target Goal *</label>
                            <select id="target_goal" name="target_goal" required>
                                <option value="">Select a target goal</option>
                                {% for goal in target_goals %}
                                <option value="{{ goal }}">{{ goal }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="instrument_type">Instrument Type</label>
                            <select id="instrument_type" name="instrument_type">
                                <option value="">All instruments</option>
                                {% for inst in instrument_types %}
                                <option value="{{ inst }}">{{ inst }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="function">Function</label>
                            <select id="function" name="function">
                                <option value="">Any function</option>
                                {% for func in functions %}
                                <option value="{{ func }}">{{ func }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="user_level">Your Level (1-10)</label>
                            <input type="number" id="user_level" name="user_level" min="1" max="10" value="5">
                        </div>

                        <div class="form-group">
                            <label for="main_goals">Main Goals (comma-separated)</label>
                            <input type="text" id="main_goals" name="main_goals" 
                                   placeholder="e.g., flexibility, breathing, sound development">
                        </div>

                        <div class="form-group">
                            <label for="user_skills">Your Skills (comma-separated)</label>
                            <input type="text" id="user_skills" name="user_skills" 
                                   placeholder="e.g., breathing, legato, staccato simple">
                        </div>

                        <div class="form-group">
                            <label for="cognitive_load">Preferred Cognitive Load</label>
                            <select id="cognitive_load" name="cognitive_load">
                                <option value="">Any</option>
                                <option value="basso">Basso (Low)</option>
                                <option value="medio">Medio (Medium)</option>
                                <option value="alto">Alto (High)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="physical_load">Preferred Physical Load</label>
                            <select id="physical_load" name="physical_load">
                                <option value="">Any</option>
                                <option value="basso">Basso (Low)</option>
                                <option value="medio">Medio (Medium)</option>
                                <option value="alto">Alto (High)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="max_level">Max Level</label>
                            <input type="number" id="max_level" name="max_level" min="1" max="10" placeholder="Optional">
                        </div>

                        <div class="form-group">
                            <label for="min_level">Min Level</label>
                            <input type="number" id="min_level" name="min_level" min="1" max="10" placeholder="Optional">
                        </div>

                        <div class="form-group full-width">
                            <div class="checkbox-group">
                                <input type="checkbox" id="previous_video_heavy" name="previous_video_heavy">
                                <label for="previous_video_heavy">I just completed a heavy/intense video (show recovery options)</label>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <div class="checkbox-group">
                                <input type="checkbox" id="use_initial_set" name="use_initial_set" checked>
                                <label for="use_initial_set">Use initial video set (20 videos)</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn">Get Recommendations</button>
                </form>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Finding the best videos for you...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="results-section" id="resultsSection">
                <div class="results-header">
                    <h2>Recommended Videos</h2>
                    <div class="results-count" id="resultsCount">0 results</div>
                </div>
                <div id="resultsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('recommendationForm');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsCount = document.getElementById('resultsCount');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous results and errors
            resultsSection.classList.remove('active');
            error.classList.remove('active');
            loading.classList.add('active');

            // Collect form data
            const formData = new FormData(form);
            const data = {
                target_goal: formData.get('target_goal'),
                instrument_type: formData.get('instrument_type'),
                function: formData.get('function'),
                user_level: formData.get('user_level'),
                main_goals: formData.get('main_goals'),
                user_skills: formData.get('user_skills'),
                cognitive_load: formData.get('cognitive_load'),
                physical_load: formData.get('physical_load'),
                max_level: formData.get('max_level'),
                min_level: formData.get('min_level'),
                previous_video_heavy: formData.has('previous_video_heavy'),
                use_initial_set: formData.has('use_initial_set'),
                max_results: 10
            };

            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                loading.classList.remove('active');

                if (result.success) {
                    displayResults(result.recommendations);
                } else {
                    showError(result.error || 'An error occurred');
                }
            } catch (err) {
                loading.classList.remove('active');
                showError('Failed to get recommendations: ' + err.message);
            }
        });

        function displayResults(recommendations) {
            if (recommendations.length === 0) {
                resultsContainer.innerHTML = '<p style="text-align: center; padding: 40px; color: #666;">No recommendations found. Try adjusting your criteria.</p>';
                resultsCount.textContent = '0 results';
            } else {
                resultsCount.textContent = `${recommendations.length} result${recommendations.length !== 1 ? 's' : ''}`;
                
                resultsContainer.innerHTML = recommendations.map((rec, index) => {
                    const v = rec.video;
                    return `
                        <div class="video-card">
                            <div class="video-header">
                                <div class="video-title">${index + 1}. ${escapeHtml(v.name)}</div>
                                <div class="video-score">Score: ${rec.score.toFixed(3)}</div>
                            </div>
                            <div class="video-info">
                                <div class="info-item">
                                    <span class="info-label">Instrument</span>
                                    <span class="info-value">${escapeHtml(v.instrument_type)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Target Goal</span>
                                    <span class="info-value">${escapeHtml(v.target_goal)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Level</span>
                                    <span class="info-value">${v.level}/10</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Function</span>
                                    <span class="info-value">${escapeHtml(v.function)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Cognitive Load</span>
                                    <span class="info-value">${escapeHtml(v.cognitive_load)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Physical Load</span>
                                    <span class="info-value">${escapeHtml(v.physical_load)}</span>
                                </div>
                            </div>
                            ${v.main_goals && v.main_goals.length > 0 ? `
                                <div class="info-item" style="margin-top: 10px;">
                                    <span class="info-label">Main Goals</span>
                                    <span class="info-value">${escapeHtml(v.main_goals.join(', '))}</span>
                                </div>
                            ` : ''}
                            ${rec.explanation ? `
                                <div class="video-explanation">
                                    💡 ${escapeHtml(rec.explanation)}
                                </div>
                            ` : ''}
                            <a href="${escapeHtml(v.url)}" target="_blank" class="video-link">
                                ▶ Watch on YouTube
                            </a>
                        </div>
                    `;
                }).join('');
            }
            
            resultsSection.classList.add('active');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
